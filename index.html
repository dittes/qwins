<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quick Wins — better, faster.</title>
  <meta name="description" content="Quick Wins. Better, faster. Coming soon." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow: #FFF200;
      --black: #0a0a0a;
      --grey: #1a1a1a;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--yellow);
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    /* ── Noise grain overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 100;
    }

    /* ── Layout ── */
    .page {
      min-height: 100dvh;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: clamp(1.5rem, 6vw, 3rem);
    }

    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      text-align: center;
      padding-top: clamp(2rem, 8vw, 5rem);
    }

    /* ── Logo ── */
    .logo-wrap {
      position: relative;
      width: clamp(100px, 38vw, 180px);
      margin-bottom: clamp(2rem, 7vw, 3.5rem);
      animation: floatIn 1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .logo-wrap svg {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 0 28px rgba(255,242,0,0.35));
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(255,242,0,0.3)); }
      50%       { filter: drop-shadow(0 0 44px rgba(255,242,0,0.65)); }
    }

    /* ── Site name ── */
    .site-name {
      font-size: clamp(2.6rem, 13vw, 6.2rem);
      font-weight: 700;
      font-style: normal;
      font-family: Arial, Helvetica, sans-serif;
      letter-spacing: -0.02em;
      line-height: 1;
      color: #ffffff;
      animation: slideUp 0.9s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* ── Claim ── */
    .claim {
      margin-top: clamp(0.5rem, 2vw, 0.9rem);
      font-size: clamp(1rem, 4vw, 1.35rem);
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.01em;
      color: var(--yellow);
      opacity: 0.85;
      animation: slideUp 0.9s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* ── Divider ── */
    .divider {
      width: clamp(40px, 16vw, 80px);
      height: 2px;
      background: var(--yellow);
      margin: clamp(2rem, 7vw, 3rem) auto;
      animation: expandIn 0.8s 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* ── Coming soon badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.6em;
      border: 1.5px solid rgba(255,242,0,0.35);
      padding: 0.55em 1.2em;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(0.7rem, 2.8vw, 0.8rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,242,0,0.6);
      animation: fadeIn 1s 0.6s both;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--yellow);
      border-radius: 50%;
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* ── Tagline area ── */
    .tagline-block {
      margin-top: clamp(2.5rem, 9vw, 4rem);
      max-width: 340px;
      animation: fadeIn 1s 0.75s both;
    }

    .tagline-block p {
      font-size: clamp(0.9rem, 3.5vw, 1rem);
      line-height: 1.7;
      color: rgba(255,242,0,0.45);
      font-family: Arial, Helvetica, sans-serif;
      font-style: italic;
    }

    /* ── Ribbon ── */
    .ribbon {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 50;
      overflow: hidden;
    }

    .ribbon-band {
      position: absolute;
      /* position so it slices diagonally across the viewport */
      top: 14%;
      left: -60%;
      width: 220%;
      padding: 13px 0;
      background: var(--yellow);
      color: var(--black);
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(0.65rem, 2.2vw, 0.85rem);
      font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      transform: rotate(-32deg);
      box-shadow: 0 4px 24px rgba(255,242,0,0.25);
      animation: ribbonIn 1s 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
      white-space: nowrap;
      /* repeat the text to fill the band */
    }

    .ribbon-band::before,
    .ribbon-band::after {
      content: 'UNDER CONSTRUCTION · UNDER CONSTRUCTION · UNDER CONSTRUCTION · UNDER CONSTRUCTION · UNDER CONSTRUCTION · ';
    }

    /* hide the ribbon-band's own text, let pseudo-elements do the work */
    .ribbon-band { font-size: 0; }
    .ribbon-band::before,
    .ribbon-band::after {
      font-size: clamp(0.65rem, 2.2vw, 0.85rem);
      display: inline;
    }

    @keyframes ribbonIn {
      from { opacity: 0; transform: rotate(-40deg) translateY(-40px); }
      to   { opacity: 1; transform: rotate(-40deg) translateY(0); }
    }

    /* ── Footer / Imprint ── */
    footer {
      border-top: 1px solid rgba(255,242,0,0.1);
      padding-top: clamp(1rem, 4vw, 1.5rem);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      animation: fadeIn 1s 1s both;
    }

    footer p, footer a {
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(0.6rem, 2.4vw, 0.68rem);
      color: rgba(255,242,0,0.22);
      letter-spacing: 0.06em;
      text-decoration: none;
      line-height: 1.6;
      text-align: center;
    }

    footer a:hover {
      color: rgba(255,242,0,0.55);
    }

    .imprint-toggle {
      background: none;
      border: none;
      cursor: pointer;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(0.6rem, 2.4vw, 0.68rem);
      color: rgba(255,242,0,0.22);
      letter-spacing: 0.06em;
      text-decoration: underline;
      text-underline-offset: 3px;
      padding: 0;
      margin-bottom: 0.25rem;
      transition: color 0.2s;
    }

    .imprint-toggle:hover { color: rgba(255,242,0,0.55); }

    .imprint-details {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.4s ease;
    }

    .imprint-details.open {
      max-height: 120px;
    }

    /* ── Background geometry ── */
    .bg-geo {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-geo::after {
      content: '';
      position: absolute;
      bottom: -30vw;
      right: -20vw;
      width: 80vw;
      height: 80vw;
      border: 1px solid rgba(255,242,0,0.04);
      border-radius: 50%;
    }

    .bg-geo::before {
      content: '';
      position: absolute;
      top: -25vw;
      left: -25vw;
      width: 70vw;
      height: 70vw;
      border: 1px solid rgba(255,242,0,0.04);
      border-radius: 50%;
    }

    .page > * { position: relative; z-index: 1; }

    /* ── Keyframes ── */
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(-24px) scale(0.92); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes expandIn {
      from { transform: scaleX(0); opacity: 0; }
      to   { transform: scaleX(1); opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>

<div class="ribbon" aria-hidden="true">
